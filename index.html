<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colección — Obra V</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    canvas {
      display: block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.75);
    }

    #hud {
      margin-top: 13px;
      width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3px;
    }

    #phase-name {
      font-family: 'Georgia', serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: #888;
      text-transform: uppercase;
    }

    #step-counter {
      font-family: 'Georgia', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #4a4a4a;
    }
  </style>
</head>

<body>
  <div id="canvas-wrap"></div>

  <div id="hud">
    <span id="phase-name">Presiona una tecla para añadir la primera figura</span>
    <span id="step-counter">R · reiniciar</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
